<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiriaka Lineup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Righteous&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="loading">
    <p>Laddar...</p>
  </div>
  <div id="picker" style="display:none;"></div>
  <div id="app" style="display:none;">
    <header id="planner-header">
      <div class="header-left">
        <button id="back-btn" type="button" class="back-btn">←</button>
        <button id="sidebar-toggle-btn" type="button" class="sidebar-toggle-btn" title="Visa/dölj sidopanel">☰</button>
      </div>
      <span id="planner-title"></span>
      <div class="header-right">
        <button id="stall-upp-alla-btn" type="button" class="manual-add-btn">Placera alla</button>
        <button id="manual-add-btn" type="button" class="manual-add-btn">+ Medlem</button>
      </div>
    </header>
    <div id="planner-body">
      <aside id="sidebar"><div id="sidebar-inner"></div></aside>
      <main id="stage-container">
        <div id="stage"></div>

      </main>
    </div>
  </div>
  <div id="manual-add-modal" class="modal" style="display:none;"></div>
  <div id="stall-upp-alla-modal" hidden></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
