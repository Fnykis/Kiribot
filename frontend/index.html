<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiriaka Lineup</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="loading">
    <p>Laddar...</p>
  </div>
  <div id="picker" style="display:none;"></div>
  <div id="app" style="display:none;">
    <header id="planner-header">
      <button id="back-btn" type="button" class="back-btn">← Tillbaka till konserter</button>
      <span id="planner-title"></span>
      <button id="stall-upp-alla-btn" type="button" class="manual-add-btn">Ställ upp alla</button>
      <button id="manual-add-btn" type="button" class="manual-add-btn">+ Lägg till annan medlem</button>
    </header>
    <div id="planner-body">
      <aside id="sidebar"></aside>
      <main id="stage-container">
        <div id="stage"></div>
        <div id="trash" title="Släpp här för att ta bort">🗑</div>
      </main>
    </div>
  </div>
  <div id="manual-add-modal" class="modal" style="display:none;"></div>
  <div id="stall-upp-alla-modal" hidden></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
